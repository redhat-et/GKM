version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

issues:
  exclude:
    - "undefined: archive.Compression"

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - dupl
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - staticcheck
    - unconvert
    - unparam
    - whitespace

  settings:
    dupl:
      threshold: 150

    goconst:
      min-len: 2
      min-occurrences: 3

    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style

    govet:
      enable:
        - shadow
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf

    lll:
      line-length: 140

    misspell:
      locale: US
