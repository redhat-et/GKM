resources:
- configMap.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Patch the configMap.yaml to change the images and tag.
# Because it is of "kind: ConfigMap", the data is opaque and kustomize can't
# update image magically.
configMapGenerator:
- behavior: merge
  literals:
  - gkm.nogpu=true
  # Note: gkm.agent.image is legacy/unused - agents use GPU-specific images
  - gkm.agent.image=quay.io/gkm/gkm-agent-nogpu:latest
  - gkm.extract.image=quay.io/gkm/gkm-extract:latest
  name: config
  namespace: gkm-system
