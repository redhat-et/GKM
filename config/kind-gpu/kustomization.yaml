resources:
- ../default

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patches:
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: gkm-agent
    path: agent-patch.yaml
  - path: agent-amd-patch.yaml
  - path: agent-nvidia-patch.yaml
  - path: agent-nogpu-patch.yaml
