apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gkm-agent-nvidia
  namespace: gkm-system
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: Exists
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
